name: Profile Summary Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: profile-summary-cards
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate profile summary cards

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: localzet
          BRANCH_NAME: main
          UTC_OFFSET: 3
          AUTO_PUSH: true
